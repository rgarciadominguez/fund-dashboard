name: Supabase Keep-Alive

on:
  schedule:
    # Cada 2 dias a las 09:37 UTC (minuto no saturado para evitar pile-up)
    - cron: '37 9 */2 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ping Supabase REST endpoint
        id: ping
        run: |
          SUPABASE_URL="https://dcnvdaaexyuhqvyrrkob.supabase.co"
          API_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          if [ -z "$API_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY secret no configurado."
            echo "http_code=missing_secret" >> $GITHUB_OUTPUT
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /tmp/sb_response.txt -w "%{http_code}" -H "apikey: $API_KEY" -H "Authorization: Bearer $API_KEY" "$SUPABASE_URL/rest/v1/")
          echo "HTTP $HTTP_CODE"
          cat /tmp/sb_response.txt
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "404" ]; then
            echo "OK: proyecto activo"
            exit 0
          else
            echo "ALERTA: respuesta inesperada ($HTTP_CODE)"
            exit 1
          fi

      - name: Update .last_ping.txt (resetea contador de 60 dias)
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC" > .last_ping.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .last_ping.txt
          if git diff --staged --quiet; then
            echo "Sin cambios para commitear"
          else
            git commit -m "chore(keep-alive): ping $(cat .last_ping.txt)"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString();
            const code = '${{ steps.ping.outputs.http_code }}' || 'unknown';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[keep-alive] Supabase ping failed (${code}) - ${date.slice(0,10)}`,
              body: `El workflow keep-alive ha fallado el ${date}.\n\nHTTP code: \`${code}\`\n\nRevisa:\n- Esta el proyecto Supabase pausado o eliminado?\n- Sigue valido el secret SUPABASE_ANON_KEY?\n- Ver run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['keep-alive', 'supabase']
            });
